<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Newsline</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f5; --text: #252a49; --text2: #666;
    --accent: #5B9BD5; --border: #e8e8e8;
    --left: #3d7bb8; --center: #999; --right: #c0392b;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #111111; --bg2: #1a1a1a; --text: #e8e8f0; --text2: rgba(232,232,240,.6); --border: rgba(232,232,240,.1); }
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); max-width: 720px; margin: 0 auto; padding: 4vh 1rem 4rem; }
  h1 { font-size: 1.4rem; letter-spacing: -.02em; }
  .updated { color: var(--text2); font-size: .8rem; }
  .story { border: 1px solid var(--border); background: var(--bg2); border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1rem; }
  .story h2 { font-size: 1.05rem; margin: 0 0 .5rem; line-height: 1.35; }
  .bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin: .5rem 0; background: var(--border); }
  .bar div { height: 100%; }
  .bar .l { background: var(--left); } .bar .c { background: var(--center); } .bar .r { background: var(--right); }
  .counts { font-size: .75rem; color: var(--text2); }
  details { margin-top: .5rem; }
  summary { cursor: pointer; font-size: .85rem; color: var(--accent); }
  .src { display: block; padding: .35rem 0; font-size: .9rem; color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); }
  .src:last-child { border-bottom: none; }
  .src .o { color: var(--text2); font-size: .8rem; }
  .muted { color: var(--text2); }
  .tabs { display: flex; gap: .4rem; margin-top: 1rem; flex-wrap: wrap; }
  .tab { border: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-size: .8rem;
    padding: .35rem .7rem; border-radius: 999px; cursor: pointer; }
  .tab.active { color: var(--bg); background: var(--text); border-color: var(--text); }
  .blindspot { display: inline-block; font-size: .7rem; color: var(--right); border: 1px solid var(--right);
    border-radius: 999px; padding: .1rem .5rem; margin-left: .5rem; vertical-align: middle; }
  input#q { width: 100%; margin-top: 1rem; padding: .6rem .8rem; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text); font-size: .9rem; }
</style>
</head>
<body>
<h1>Newsline</h1>
<p class="updated" id="updated">Loading stories…</p>
<input id="q" type="search" placeholder="Search stories…">
<div class="tabs" id="tabs">
  <button class="tab active" data-f="all">All</button>
  <button class="tab" data-f="l">Left-covered</button>
  <button class="tab" data-f="c">Center-covered</button>
  <button class="tab" data-f="r">Right-covered</button>
  <button class="tab" data-f="blindspot">Blindspots</button>
</div>
<div id="stories"></div>
<script>
const API = 'https://newsline.trommatic.workers.dev';

function side(bias) { return bias < 0 ? 'l' : bias > 0 ? 'r' : 'c'; }

let allStories = [];
let filter = 'all';
let query = '';

function render() {
  const root = document.getElementById('stories');
  root.innerHTML = '';
  const q = query.trim().toLowerCase();
  const filtered = allStories.filter(s => {
    if (q && !s.title.toLowerCase().includes(q)) return false;
    if (filter === 'blindspot') return s.blindspot;
    if (filter === 'all') return true;
    return s.sources.some(x => side(x.bias) === filter);
  });
  if (!filtered.length) {
    root.innerHTML = '<p class="muted">No stories match.</p>';
    return;
  }
  for (const s of filtered) {
    const n = { l: 0, c: 0, r: 0 };
    for (const x of s.sources) n[side(x.bias)]++;
    const total = s.sources.length;
    const el = document.createElement('div');
    el.className = 'story';
    el.innerHTML = `
      <h2>${s.title}${s.blindspot ? '<span class="blindspot">blindspot</span>' : ''}</h2>
      <div class="bar">
        <div class="l" style="width:${n.l / total * 100}%"></div>
        <div class="c" style="width:${n.c / total * 100}%"></div>
        <div class="r" style="width:${n.r / total * 100}%"></div>
      </div>
      <div class="counts">${n.l} left · ${n.c} center · ${n.r} right — ${total} source${total > 1 ? 's' : ''}</div>
      <details><summary>Coverage</summary>${
        s.sources.map(x => `<a class="src" href="${x.link}" target="_blank" rel="noopener">${x.title} <span class="o">— ${x.outlet}</span></a>`).join('')
      }</details>`;
    root.appendChild(el);
  }
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  filter = btn.dataset.f;
  render();
});
document.getElementById('q').addEventListener('input', e => { query = e.target.value; render(); });

fetch(API).then(r => r.json()).then(({ updated, stories }) => {
  allStories = stories;
  document.getElementById('updated').textContent =
    `${stories.length} stories · updated ${new Date(updated).toLocaleTimeString()}`;
  render();
}).catch(() => {
  document.getElementById('updated').textContent = 'Failed to load stories.';
});
</script>
</body>
</html>
