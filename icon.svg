<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1c1c1e" rx="32"/>
  <!-- Balance beam -->
  <line x1="60" y1="90" x2="140" y2="90" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="60" x2="100" y2="140" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Fulcrum -->
  <path d="M92 140 L108 140 L120 156 L80 156 Z" fill="white"/>
  <!-- Left pan (blue) -->
  <line x1="60" y1="90" x2="60" y2="112" stroke="rgba(91,155,213,0.8)" stroke-width="3"/>
  <path d="M42 112 A18 12 0 0 0 78 112 Z" fill="rgba(91,155,213,0.85)"/>
  <!-- Right pan (red) -->
  <line x1="140" y1="90" x2="140" y2="112" stroke="rgba(192,57,43,0.8)" stroke-width="3"/>
  <path d="M122 112 A18 12 0 0 0 158 112 Z" fill="rgba(192,57,43,0.85)"/>
  <!-- Top dot -->
  <circle cx="100" cy="60" r="5" fill="white"/>
</svg>
