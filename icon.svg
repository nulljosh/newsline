<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1c1c1e" rx="32"/>
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5B9BD5"/>
      <stop offset="50%" stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>
  <!-- Stacked headline bars, each a bias-spectrum slice -->
  <rect x="40" y="70" width="120" height="14" rx="7" fill="url(#spectrum)"/>
  <rect x="40" y="93" width="90" height="14" rx="7" fill="url(#spectrum)" opacity="0.75"/>
  <rect x="40" y="116" width="70" height="14" rx="7" fill="url(#spectrum)" opacity="0.5"/>
</svg>
